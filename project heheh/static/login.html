<!-- Decorative ambient shapes (Neo-brutalist / Glassmorphic mix) -->

<div class="absolute bottom-10 right-10 w-96 h-96 bg-secondary-fixed/10 rounded-full blur-[120px] z-0"></div>

<!-- Graphic / Branding Section (Hidden on small screens to focus on transaction) -->
<div class="hidden md:flex flex-col justify-center items-center h-full relative">
<div class="w-full aspect-square rounded-xl overflow-hidden border-2 border-outline-variant relative bg-surface-container-lowest">
<img class="w-full h-full object-cover object-center absolute inset-0 mix-blend-lighten" data-alt="A high-fidelity 3D rendering of a glossy, stylized toy character floating against a dark, minimalist CAD grid background." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAzpizDDNxxoaC5_wofVNVustghxzRNKPbjZ9E-OQGOWaOo7pDhswqNdJm7mCcLOewrW7-PYSvA3R0tZeq3DmbHzZi6mqHwLWuJXX7wda0iCLz5u-9TK2W5CmqNAtZp8pDsU0z0reEAoJ3KbIZU8WMzwqQu8TIZKZVOnC4af091cVUGMY5zmPxv_isoyMp1m1I0jyeKvEcafej2XyjRjEkUXfmhgKjc4OZp_ppTXwKVToPTp5G9EzqG-Q"/>
<div class="absolute inset-0 bg-gradient-to-t from-background via-transparent to-transparent"></div>
</div>
</div>
<!-- Login Card (Glassmorphic Neo-Brutalist) -->
<div class="flex flex-col items-center justify-center w-full max-w-md mx-auto">
<div class="bg-surface-dim/80 backdrop-blur-2xl border-2 border-outline-variant rounded-xl p-md md:p-xl w-full shadow-2xl relative overflow-hidden">
<!-- Inner subtle glow -->
<div class="absolute top-0 left-1/2 -translate-x-1/2 w-[80%] h-1 bg-gradient-to-r from-transparent via-primary-fixed/30 to-transparent"></div>
<div class="text-center mb-xl">
<div class="flex items-center justify-center gap-2 mb-sm">
<span class="material-symbols-outlined text-primary-fixed text-[40px]" data-icon="toys" data-weight="fill">toys</span>
</div>
<h1 class="font-headline-xl text-headline-xl text-primary-fixed font-black tracking-tighter">ToyCad<br/>Hack</h1>
<p class="text-on-surface-variant mt-xs">Build the future, one stud at a time.</p>
</div>
<form id="login-form" class="space-y-md">
<!-- Username Input -->
<div class="space-y-xs">
<label class="font-label-sm text-label-sm text-on-surface ml-4 block uppercase" for="username">Username</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-on-surface-variant">person</span>
<input class="w-full bg-surface-container-lowest text-on-surface border-2 border-surface-variant rounded-full py-4 pl-12 pr-4 focus:outline-none focus:border-primary-fixed focus:ring-1 focus:ring-primary-fixed transition-colors placeholder:text-surface-variant font-body-md text-body-md" id="username" placeholder="Username" type="text"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-xs">
<label class="font-label-sm text-label-sm text-on-surface ml-4 block uppercase" for="password">Password</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-on-surface-variant">key</span>
<input class="w-full bg-surface-container-lowest text-on-surface border-2 border-surface-variant rounded-full py-4 pl-12 pr-4 focus:outline-none focus:border-primary-fixed focus:ring-1 focus:ring-primary-fixed transition-colors placeholder:text-surface-variant font-body-md text-body-md" id="password" placeholder="Password" type="password"/>
</div>
</div>
<!-- Error message area -->
<div id="login-error" class="hidden px-4 py-3 rounded-full bg-error-container/30 border border-error/30 text-error font-label-sm text-label-sm text-center"></div>
<div class="flex items-center justify-between px-4 pb-2">
<label class="flex items-center gap-2 cursor-pointer group">
<input class="form-checkbox w-5 h-5 rounded-[4px] border-2 border-surface-variant bg-surface-container-lowest text-primary-fixed focus:ring-primary-fixed focus:ring-offset-background group-hover:border-primary-fixed transition-colors" type="checkbox"/>
<span class="font-label-sm text-label-sm text-on-surface-variant group-hover:text-on-surface transition-colors">Remember me</span>
</label>
<a class="font-label-sm text-label-sm text-primary-fixed hover:text-white transition-colors" href="#">Forgot Key?</a>
</div>
<!-- Primary Action Button -->
<button id="login-btn" class="w-full bg-primary-fixed text-on-primary-fixed font-headline-lg text-[20px] font-bold py-4 rounded-full border-[3px] border-surface-container-lowest hover:bg-white hover:-translate-y-1 hover:shadow-[0_4px_0_0_#1c1b1b] active:translate-y-0 active:shadow-none transition-all flex items-center justify-center gap-2" type="submit">
<span>Sign In</span>
<span class="material-symbols-outlined text-[24px]">arrow_forward</span>
</button>
</form>
<div class="mt-lg text-center">
<p class="font-label-sm text-label-sm text-on-surface-variant">
                        Don't have an ID? <a class="text-secondary-fixed hover:text-white transition-colors underline decoration-2 underline-offset-4" href="register.html">Join the Hackathon</a>
</p>
</div>
</div>
</div>
</div>

<script>
const API = window.location.origin;

document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const errorEl = document.getElementById('login-error');
    const btn = document.getElementById('login-btn');
    errorEl.classList.add('hidden');
    btn.disabled = true;
    btn.querySelector('span:first-child').textContent = 'Signing in...';

    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    if (!username || !password) {
        errorEl.textContent = 'Please enter both username and password.';
        errorEl.classList.remove('hidden');
        btn.disabled = false;
        btn.querySelector('span:first-child').textContent = 'Sign In';
        return;
    }

    try {
        const res = await fetch(`${API}/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });

        if (!res.ok) {
            const err = await res.json();
            throw new Error(err.detail || 'Login failed');
        }

        const data = await res.json();
        // Store session data
        sessionStorage.setItem('user_id', data.user_id);
        sessionStorage.setItem('role', data.role);
        sessionStorage.setItem('team_id', data.team_id);
        sessionStorage.setItem('username', username);

        // Redirect based on role
        const redirectMap = {
            admin: 'admin.html',
            judge: 'judge.html',
            participant: 'participant.html'
        };
        window.location.href = redirectMap[data.role] || 'login.html';

    } catch (err) {
        errorEl.textContent = err.message;
        errorEl.classList.remove('hidden');
        btn.disabled = false;
        btn.querySelector('span:first-child').textContent = 'Sign In';
    }
});
</script>
